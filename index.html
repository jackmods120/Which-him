<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سەکۆی سینەما</title>
    <style>
        @font-face {
            font-family: 'JackFont';
            src: url('./jack.ttf') format('truetype');
        }
        
        :root {
            --primary: #A78BFA;
            --primary-hover: #8B5CF6;
            --bg-glass: rgba(30, 20, 50, 0.4);
            --border-glass: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #e2e8f0;
            --danger: #ef4444;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JackFont', sans-serif !important; }
        
        body {
            background-image: url('./web_bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #0f0f1a;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
        }

        .container { width: 100%; max-width: 1300px; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 2.5rem; font-weight: normal; display: flex; align-items: center; justify-content: center; gap: 10px; }
        header p { color: var(--text-muted); font-size: 1.1rem; margin-top: 5px; }

        .input-group { margin-bottom: 20px; text-align: right; }
        .input-label { display: block; font-size: 1rem; color: var(--text-muted); margin-bottom: 8px; margin-right: 5px; }
        
        .glass-input {
            width: 100%; padding: 14px 20px; background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 16px;
            color: white; font-size: 1.1rem; outline: none; transition: all 0.3s ease;
        }
        .glass-input:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.5); box-shadow: 0 0 15px rgba(167, 139, 250, 0.3); }
        .glass-input::placeholder { color: rgba(255,255,255,0.5); }

        .glass-btn {
            width: 100%; padding: 14px; border: none; border-radius: 16px;
            font-size: 1.2rem; cursor: pointer; transition: 0.3s ease; text-align: center;
        }
        .btn-white { background: #ffffff; color: #1e1e1e; }
        .btn-white:hover { background: #e0e0e0; transform: translateY(-2px); }
        .btn-outline { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.4); }
        .btn-outline:hover { background: rgba(255,255,255,0.1); }
        .btn-danger { background: var(--danger); color: white; }

        .room-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .room-grid { grid-template-columns: 1fr; } }

        .video-wrapper {
            background: #000; border-radius: 20px; overflow: hidden;
            aspect-ratio: 16/9; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid var(--border-glass); position: relative;
        }
        .video-wrapper video, .video-wrapper iframe { width: 100%; height: 100%; border: none; outline: none; object-fit: contain; }

        .tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid var(--border-glass); padding-bottom: 10px;}
        .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; padding: 5px 10px; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .chat-container { height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        .message { background: rgba(0,0,0,0.4); padding: 10px 15px; border-radius: 18px; width: fit-content; max-width: 85%; }
        .message.mine { background: rgba(167, 139, 250, 0.5); align-self: flex-end; border: 1px solid rgba(167, 139, 250, 0.3); }
        .msg-name { font-size: 0.9rem; color: var(--primary); margin-bottom: 4px; display: block; cursor: pointer;}
        .msg-name.owner { color: #FFD700; }
        .msg-text { font-size: 1.1rem; }

        .chat-input-box { display: flex; gap: 10px; margin-top: 15px; }
        .send-btn { background: var(--primary); color: white; border: none; border-radius: 16px; padding: 0 20px; cursor: pointer; font-size: 1.1rem;}

        .friend-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; margin-bottom: 10px; }
        .invite-btn { background: var(--primary); border: none; color: white; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }

        .ios-switch { position: relative; width: 44px; height: 24px; background: rgba(255,255,255,0.3); border-radius: 24px; cursor: pointer; transition: 0.3s; }
        .ios-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: 0.3s; }
        .ios-switch.active { background: var(--primary); }
        .ios-switch.active::after { transform: translateX(20px); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginView" class="glass-panel" style="max-width: 450px; margin: auto;">
        <header>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg>
            <h1>بەخێربێیتەوە!</h1>
            <p>بچۆ ژوورەوە بۆ بەکارهێنانی سەکۆی سینەما</p>
        </header>
        <div class="input-group">
            <label class="input-label">ناوی خۆت بنووسە</label>
            <input type="text" id="userNameInput" class="glass-input" placeholder="نموونە: جاک...">
        </div>
        <button id="loginBtn" class="glass-btn btn-white">چوونە ژوورەوە</button>
    </div>

    <div id="homeView" class="hidden">
        <header>
            <h1>سەکۆی بینین</h1>
            <p>سڵاو <span id="displayMyName" style="color:var(--primary);"></span> | ئایدی تۆ: <span id="displayMyId" style="user-select:all; cursor:pointer;"></span></p>
        </header>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
            <div class="glass-panel">
                <h3 style="margin-bottom: 20px; font-size: 1.4rem;">🎬 ژووری سەیرکردن</h3>
                <div class="input-group">
                    <input type="text" id="newVideoInput" class="glass-input" placeholder="لینک لێرە دابنێ...">
                </div>
                <button id="createRoomBtn" class="glass-btn btn-white" style="margin-bottom: 20px;">دروستکردنی ژوور</button>
                <div class="input-group" style="text-align: center; color: rgba(255,255,255,0.5);">یان</div>
                <div class="input-group">
                    <input type="text" id="joinRoomInput" class="glass-input" placeholder="کۆدی ژووری هاوڕێکەت...">
                </div>
                <button id="joinRoomBtn" class="glass-btn btn-outline">چوونە ناو ژوور</button>
            </div>

            <div class="glass-panel">
                <h3 style="margin-bottom: 20px; font-size: 1.4rem;">👥 هاوڕێیان</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input type="text" id="friendIdInput" class="glass-input" placeholder="ئایدی هاوڕێکەت...">
                    <button id="addFriendBtn" class="glass-btn btn-white" style="width: auto; padding: 0 20px;">زیادکردن</button>
                </div>
                <h4 style="margin-bottom: 10px; color: var(--text-muted); font-size: 1.2rem;">لیستی هاوڕێکانم</h4>
                <div id="friendsList" style="max-height: 200px; overflow-y: auto;">
                    <p style="color: rgba(255,255,255,0.5); font-size:1rem;">هیچ هاوڕێیەکت زیاد نەکردووە.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="roomView" class="hidden">
        <div class="glass-panel" style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; padding: 15px 30px;">
            <div>
                <span style="color: var(--text-muted); font-size: 1.1rem;">کۆدی ژوور:</span>
                <strong id="roomCodeDisplay" style="font-size: 1.5rem; letter-spacing: 2px; color: var(--primary);">---</strong>
            </div>
            <button id="leaveRoomBtn" class="glass-btn btn-danger" style="width: auto; padding: 10px 20px; font-size: 1.1rem;">جێهێشتن</button>
        </div>

        <div class="room-grid">
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div class="video-wrapper" id="playerWrapper">
                    <div style="display:flex; height:100%; align-items:center; justify-content:center; color:#aaa; font-size: 1.2rem;">چاوەڕێی ڤیدیۆ...</div>
                </div>

                <div id="adminControls" class="glass-panel hidden" style="padding: 20px;">
                    <h3 style="margin-bottom: 15px; color: var(--primary); font-size: 1.3rem;">⚙️ ڕێکخستنی ئەدمین</h3>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 1.1rem;">
                        <span>قوفڵکردنی چات</span>
                        <div id="chatLockSwitch" class="ios-switch"></div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="updateVideoInput" class="glass-input" placeholder="لینکی نوێ دابنێ...">
                        <button id="updateVideoBtn" class="glass-btn btn-white" style="width: auto; padding: 0 20px;">گۆڕین</button>
                    </div>
                </div>
            </div>

            <div class="glass-panel" style="display: flex; flex-direction: column; padding: 20px;">
                <div class="tabs">
                    <button class="tab-btn active" id="tabChat">چات</button>
                    <button class="tab-btn" id="tabInvite">بانگهێشت</button>
                </div>
                <div id="chatSection" style="flex:1; display:flex; flex-direction:column;">
                    <div class="chat-container" id="chatBox"></div>
                    <div id="chatLockedMsg" style="text-align:center; color:var(--danger); padding:10px; display:none; font-size:1.1rem;">
                        🔒 چات داخراوە
                    </div>
                    <div class="chat-input-box" id="chatInputArea">
                        <input type="text" id="chatInput" class="glass-input" placeholder="نامە بنووسە...">
                        <button id="sendChatBtn" class="send-btn">ناردن</button>
                    </div>
                </div>
                <div id="inviteSection" class="hidden" style="flex:1; overflow-y:auto;">
                    <p style="font-size:1.1rem; color:var(--text-muted); margin-bottom:10px;">بانگهێشتی هاوڕێکانت بکە:</p>
                    <div id="inviteFriendsList"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, update, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAc0iAMRewvMEfpxBRAVsMs7s8ppskeUp8",
        authDomain: "whith-him.firebaseapp.com",
        databaseURL: "https://whith-him-default-rtdb.firebaseio.com/",
        projectId: "whith-him",
        storageBucket: "whith-him.firebasestorage.app",
        messagingSenderId: "677366602778",
        appId: "1:677366602778:web:db312776554c5bba9945a3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myId = localStorage.getItem('cine_kurd_id');
    if (!myId) {
        myId = Math.random().toString(36).substr(2, 6).toUpperCase();
        localStorage.setItem('cine_kurd_id', myId);
    }
    let myName = localStorage.getItem('cine_kurd_name') || "";
    let myFriends = JSON.parse(localStorage.getItem('cine_kurd_friends') || "{}");

    let currentRoomId = null;
    let roomDataGlobal = null;
    let isOwner = false;
    let isAdmin = false;
    let currentLoadedUrl = "";
    let videoPlayer = null;
    let isSeeking = false;

    const loginView = document.getElementById('loginView');
    const homeView = document.getElementById('homeView');
    const roomView = document.getElementById('roomView');

    if (myName) showHome();

    document.getElementById('loginBtn').addEventListener('click', () => {
        const name = document.getElementById('userNameInput').value.trim();
        if (name) {
            myName = name;
            localStorage.setItem('cine_kurd_name', name);
            showHome();
        }
    });

    function showHome() {
        loginView.classList.add('hidden');
        roomView.classList.add('hidden');
        homeView.classList.remove('hidden');
        document.getElementById('displayMyName').textContent = myName;
        document.getElementById('displayMyId').textContent = myId;
        renderFriendsList();
    }

    document.getElementById('addFriendBtn').addEventListener('click', () => {
        const friendId = document.getElementById('friendIdInput').value.trim().toUpperCase();
        if (!friendId || friendId === myId) return alert('ئایدی هەڵەیە!');
        myFriends[friendId] = { id: friendId, name: "هاوڕێ (" + friendId + ")" };
        localStorage.setItem('cine_kurd_friends', JSON.stringify(myFriends));
        document.getElementById('friendIdInput').value = '';
        renderFriendsList();
        alert('هاوڕێکەت زیادکرا!');
    });

    function renderFriendsList() {
        const list = document.getElementById('friendsList');
        const inviteList = document.getElementById('inviteFriendsList');
        list.innerHTML = ''; inviteList.innerHTML = '';
        
        const keys = Object.keys(myFriends);
        if (keys.length === 0) return;

        keys.forEach(id => {
            list.innerHTML += `<div class="friend-item"><span>👤 ${myFriends[id].name} (ID: ${id})</span></div>`;
            inviteList.innerHTML += `<div class="friend-item">
                <span>👤 ${myFriends[id].name}</span>
                <button class="invite-btn" onclick="alert('کۆدی ژوورەکەت (${currentRoomId}) بنێرە بۆ ئەم هاوڕێیەت.')">بانگهێشت</button>
            </div>`;
        });
    }

    document.getElementById('createRoomBtn').addEventListener('click', async () => {
        const url = document.getElementById('newVideoInput').value.trim();
        if(!url) return alert("تکایە لینکێک بنووسە!");
        
        const roomId = Math.random().toString(36).substr(2, 5).toUpperCase();
        await set(ref(db, `rooms_ku/${roomId}`), {
            ownerId: myId, videoUrl: url, chatLocked: false, admins: { [myId]: true },
            state: { time: 0, status: 'paused', updatedBy: myId, timestamp: Date.now() }
        });
        enterRoom(roomId);
    });

    document.getElementById('joinRoomBtn').addEventListener('click', async () => {
        const code = document.getElementById('joinRoomInput').value.trim().toUpperCase();
        if(!code) return alert("کۆد بنووسە!");
        
        const snap = await get(ref(db, `rooms_ku/${code}`));
        if (snap.exists()) { enterRoom(code); } 
        else { alert("ژوورەکە بوونی نییە!"); }
    });

    function enterRoom(roomId) {
        currentRoomId = roomId;
        homeView.classList.add('hidden');
        roomView.classList.remove('hidden');
        document.getElementById('roomCodeDisplay').textContent = roomId;
        currentLoadedUrl = "";

        onValue(ref(db, `rooms_ku/${roomId}`), (snap) => {
            if (!snap.exists()) { alert("ژوور داخراوە"); leaveRoom(); return; }
            const data = snap.val();
            roomDataGlobal = data;
            isOwner = (data.ownerId === myId);
            isAdmin = (data.admins && data.admins[myId]) || isOwner;

            if (isAdmin) {
                document.getElementById('adminControls').classList.remove('hidden');
                document.getElementById('updateVideoInput').value = data.videoUrl;
            } else {
                document.getElementById('adminControls').classList.add('hidden');
            }

            const chatLockSwitch = document.getElementById('chatLockSwitch');
            if (data.chatLocked) {
                chatLockSwitch.classList.add('active');
                if (!isAdmin) {
                    document.getElementById('chatInputArea').style.display = 'none';
                    document.getElementById('chatLockedMsg').style.display = 'block';
                }
            } else {
                chatLockSwitch.classList.remove('active');
                document.getElementById('chatInputArea').style.display = 'flex';
                document.getElementById('chatLockedMsg').style.display = 'none';
            }

            if (data.videoUrl && data.videoUrl !== currentLoadedUrl) {
                currentLoadedUrl = data.videoUrl;
                loadSmartVideo(data.videoUrl);
            }

            if (!isAdmin && videoPlayer && data.state) {
                if (Math.abs(videoPlayer.currentTime - data.state.time) > 2) {
                    videoPlayer.currentTime = data.state.time;
                }
                if (data.state.status === 'playing' && videoPlayer.paused) {
                    videoPlayer.play().catch(()=>{});
                } else if (data.state.status === 'paused' && !videoPlayer.paused) {
                    videoPlayer.pause();
                }
            }
        });

        onValue(ref(db, `rooms_ku/${roomId}/messages`), (snap) => {
            const box = document.getElementById('chatBox');
            box.innerHTML = '';
            snap.forEach(child => {
                const msg = child.val();
                const isMe = msg.senderId === myId;
                const isMsgOwner = msg.senderId === roomDataGlobal.ownerId;
                const isMsgAdmin = roomDataGlobal.admins && roomDataGlobal.admins[msg.senderId];
                let badge = isMsgOwner ? '👑' : (isMsgAdmin ? '🛡️' : '');
                
                const div = document.createElement('div');
                div.className = `message ${isMe ? 'mine' : ''}`;
                div.innerHTML = `
                    <span class="msg-name ${isMsgOwner?'owner':''}" data-uid="${msg.senderId}" data-name="${msg.name}">
                        ${badge} ${msg.name}
                    </span>
                    <div class="msg-text">${msg.text}</div>
                `;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;

            if (isOwner) {
                document.querySelectorAll('.msg-name').forEach(el => {
                    el.addEventListener('click', (e) => {
                        const tId = e.currentTarget.dataset.uid;
                        if (tId === myId) return;
                        if (confirm(`دەتەوێت (${e.currentTarget.dataset.name}) بکەیت بە ئەدمین؟`)) {
                            update(ref(db, `rooms_ku/${currentRoomId}/admins`), { [tId]: true });
                        }
                    });
                });
            }
        });
    }

    // سیستەمی زیرەکی ئەندازیاری بۆ کردنەوەی خێرای ڤیدیۆ یان وێبسایت بێ کێشە
    function loadSmartVideo(url) {
        const wrapper = document.getElementById('playerWrapper');
        wrapper.innerHTML = '';
        videoPlayer = null;

        const cleanUrl = url.trim();
        const isYoutube = cleanUrl.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))((\w|-){11})/);
        // لێرەدا دەزانێت کە ئایا ئەمە ڤیدیۆیەکی ڕاستەقینەیە یان وێبسایتی بۆتە
        const isRawVideo = cleanUrl.match(/\.(mp4|webm|ogg|mov)$/i);

        // 1. ئەگەر یوتیوب بوو
        if (isYoutube) {
            wrapper.innerHTML = `<iframe src="https://www.youtube.com/embed/${isYoutube[1]}?autoplay=1" allow="autoplay; fullscreen" style="width:100%; height:100%; border:none;"></iframe>`;
            return;
        }

        // 2. ئەگەر لینکەکە ڤیدیۆ نەبوو (وەک ئەوەی بۆتی تێلیگرام کە پەڕەیەکە)
        if (!isRawVideo) {
            // ڕاستەوخۆ دەیکاتە پەنجەرە (Iframe) بۆ ئەوەی هەرگیز وێنەی شکاو نەیەت و زۆر خێرا بێت
            wrapper.innerHTML = `<iframe src="${cleanUrl}" allow="autoplay; fullscreen" style="width:100%; height:100%; border:none;"></iframe>`;
            return;
        }

        // 3. ئەگەر ڕاستەوخۆ ڤیدیۆی خاو بوو (mp4) ئەوا بە خێراییەکی زۆر دەیکاتەوە
        videoPlayer = document.createElement('video');
        videoPlayer.src = cleanUrl;
        videoPlayer.controls = true;
        videoPlayer.preload = "auto"; // خێرایی باوەڕپێنەکراو لە هێنان
        videoPlayer.setAttribute('playsinline', '');
        videoPlayer.setAttribute('controlsList', 'nodownload'); // ڕێگری لە داگرتن
        videoPlayer.oncontextmenu = () => false;
        videoPlayer.style.width = "100%";
        videoPlayer.style.height = "100%";
        
        // ئەمە گرنگترین بەشە: ئەگەر هاتوو ڤیدیۆ پلەیەرەکە شکستی هێنا لە کردنەوەی، ئۆتۆماتیک دەیگۆڕێت بۆ Iframe!
        videoPlayer.onerror = function() {
            wrapper.innerHTML = `<iframe src="${cleanUrl}" allow="autoplay; fullscreen" style="width:100%; height:100%; border:none;"></iframe>`;
            videoPlayer = null; // ئیتر ناتوانرێت کۆنترۆڵ بکرێت چونکە بوو بە پەنجەرە
        };

        wrapper.appendChild(videoPlayer);

        // کۆنترۆڵی خاوەن/ئەدمین
        videoPlayer.addEventListener('play', () => { if (isAdmin && !isSeeking) updateState('playing'); });
        videoPlayer.addEventListener('pause', () => { if (isAdmin && !isSeeking) updateState('paused'); });
        videoPlayer.addEventListener('seeked', () => { if (isAdmin) updateState(videoPlayer.paused ? 'paused' : 'playing'); isSeeking = false; });
        videoPlayer.addEventListener('seeking', () => { isSeeking = true; });

        // کۆنترۆڵی ئەندامان
        if (!isAdmin) {
            videoPlayer.addEventListener('play', (e) => { if (roomDataGlobal.state.status === 'paused') { e.preventDefault(); videoPlayer.pause(); } });
            videoPlayer.addEventListener('pause', (e) => { if (roomDataGlobal.state.status === 'playing') { e.preventDefault(); videoPlayer.play(); } });
        }
    }

    function updateState(status) {
        if (!currentRoomId || !videoPlayer) return;
        update(ref(db, `rooms_ku/${currentRoomId}/state`), {
            time: videoPlayer.currentTime, status: status, updatedBy: myId, timestamp: Date.now()
        });
    }

    document.getElementById('chatLockSwitch').addEventListener('click', () => {
        if (!isAdmin) return;
        update(ref(db, `rooms_ku/${currentRoomId}`), { chatLocked: !roomDataGlobal.chatLocked });
    });

    document.getElementById('updateVideoBtn').addEventListener('click', () => {
        if (!isAdmin) return;
        const url = document.getElementById('updateVideoInput').value.trim();
        if (url) update(ref(db, `rooms_ku/${currentRoomId}`), { videoUrl: url });
    });

    document.getElementById('sendChatBtn').addEventListener('click', () => {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text || !currentRoomId) return;
        push(ref(db, `rooms_ku/${currentRoomId}/messages`), {
            senderId: myId, name: myName, text: text, timestamp: Date.now()
        });
        input.value = '';
    });
    document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('sendChatBtn').click(); });

    document.getElementById('leaveRoomBtn').addEventListener('click', leaveRoom);
    function leaveRoom() {
        currentRoomId = null; videoPlayer = null;
        roomView.classList.add('hidden');
        showHome();
    }

    document.getElementById('tabChat').addEventListener('click', (e) => {
        e.target.classList.add('active'); document.getElementById('tabInvite').classList.remove('active');
        document.getElementById('chatSection').classList.remove('hidden'); document.getElementById('inviteSection').classList.add('hidden');
    });
    document.getElementById('tabInvite').addEventListener('click', (e) => {
        e.target.classList.add('active'); document.getElementById('tabChat').classList.remove('active');
        document.getElementById('inviteSection').classList.remove('hidden'); document.getElementById('chatSection').classList.add('hidden');
    });

</script>
</body>
                            </html>
