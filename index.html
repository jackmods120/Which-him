<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سەکۆی سینەما</title>
    <style>
        @font-face {
            font-family: 'JackFont';
            src: url('./jack.ttf') format('truetype');
        }
        
        :root {
            --primary: #A78BFA;
            --primary-hover: #8B5CF6;
            --bg-glass: rgba(30, 20, 50, 0.4);
            --border-glass: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #e2e8f0;
            --danger: #ef4444;
            --google: #4285F4;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JackFont', sans-serif !important; }
        
        body {
            background-image: url('./web_bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #0f0f1a;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-panel {
            background: var(--bg-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass); border-radius: 24px; padding: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); width: 100%;
        }

        .container { width: 100%; max-width: 1300px; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 2.5rem; font-weight: normal; display: flex; align-items: center; justify-content: center; gap: 10px; }
        header p { color: var(--text-muted); font-size: 1.1rem; margin-top: 5px; }

        .input-group { margin-bottom: 15px; text-align: right; }
        .input-label { display: block; font-size: 1rem; color: var(--text-muted); margin-bottom: 8px; margin-right: 5px; }
        
        .glass-input {
            width: 100%; padding: 14px 20px; background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 16px;
            color: white; font-size: 1.1rem; outline: none; transition: all 0.3s ease;
        }
        .glass-input:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.5); box-shadow: 0 0 15px rgba(167, 139, 250, 0.3); }

        .glass-btn {
            width: 100%; padding: 14px; border: none; border-radius: 16px;
            font-size: 1.1rem; cursor: pointer; transition: 0.3s ease; text-align: center; margin-bottom: 10px;
        }
        .btn-white { background: #ffffff; color: #1e1e1e; }
        .btn-white:hover { background: #e0e0e0; transform: translateY(-2px); }
        .btn-google { background: var(--google); color: white; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-google:hover { background: #3367D6; }
        .btn-outline { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.4); }
        .btn-danger { background: var(--danger); color: white; }

        .btn-accept { background: #10B981; color: white; border: none; border-radius: 12px; padding: 8px 15px; cursor: pointer; }
        .btn-reject { background: var(--danger); color: white; border: none; border-radius: 12px; padding: 8px 15px; cursor: pointer; margin-right: 8px; }

        .room-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .room-grid { grid-template-columns: 1fr; } }

        .video-wrapper {
            background: #000; border-radius: 20px; overflow: hidden;
            aspect-ratio: 16/9; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid var(--border-glass); position: relative;
        }
        .video-wrapper video, .video-wrapper iframe { width: 100%; height: 100%; border: none; outline: none; object-fit: contain; }

        .chat-container { height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        .message { background: rgba(0,0,0,0.4); padding: 10px 15px; border-radius: 18px; width: fit-content; max-width: 85%; }
        .message.mine { background: rgba(167, 139, 250, 0.5); align-self: flex-end; border: 1px solid rgba(167, 139, 250, 0.3); }
        .msg-name { font-size: 0.9rem; color: var(--primary); margin-bottom: 4px; display: block; cursor: pointer;}
        .msg-text { font-size: 1.1rem; }
        
        .chat-input-box { display: flex; gap: 10px; margin-top: 15px; }
        .send-btn { background: var(--primary); color: white; border: none; border-radius: 16px; padding: 0 20px; cursor: pointer; font-size: 1.1rem;}

        .friend-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s;}
        .friend-item:hover { background: rgba(167, 139, 250, 0.2); }
        .dm-btn { background: var(--primary); border: none; color: white; padding: 5px 10px; border-radius: 8px; cursor: pointer; }

        .request-item { display: flex; justify-content: space-between; align-items: center; background: rgba(167, 139, 250, 0.15); padding: 12px; border-radius: 12px; margin-bottom: 10px; }

        .ios-switch { position: relative; width: 44px; height: 24px; background: rgba(255,255,255,0.3); border-radius: 24px; cursor: pointer; transition: 0.3s; }
        .ios-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: 0.3s; }
        .ios-switch.active { background: var(--primary); }
        .ios-switch.active::after { transform: translateX(20px); }

        .hidden { display: none !important; }

        /* چاتی تایبەت (DM) */
        #privateChatView { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-glass); backdrop-filter: blur(30px); z-index: 100; padding: 20px; display: flex; flex-direction: column; }
        .dm-header { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        .dm-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 20px; }
    </style>
</head>
<body>

<div class="container">
    <!-- بەشی چوونە ژوورەوە بە فایەربەیس -->
    <div id="loginView" class="glass-panel" style="max-width: 450px; margin: auto;">
        <header>
            <h1>بەخێربێیتەوە!</h1>
            <p>چوونە ژوورەوە بۆ سەکۆی سینەما</p>
        </header>

        <!-- ئیمەیڵ و پاسۆرد -->
        <div class="input-group">
            <input type="email" id="emailInput" class="glass-input" placeholder="ئیمەیڵەکەتبنووسە...">
        </div>
        <div class="input-group">
            <input type="password" id="passwordInput" class="glass-input" placeholder="وشەی نهێنی...">
        </div>
        
        <button id="loginEmailBtn" class="glass-btn btn-white">چوونە ژوورەوە</button>
        <button id="signupEmailBtn" class="glass-btn btn-outline" style="margin-bottom: 20px;">دروستکردنی هەژمار</button>

        <div style="text-align: center; color: rgba(255,255,255,0.5); margin-bottom: 20px;">یان</div>

        <!-- بەستنەوە بە گوگڵ و میوان -->
        <button id="loginGoogleBtn" class="glass-btn btn-google">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/></svg>
            چوونە ژوورەوە بە Google
        </button>
        <button id="loginAnonBtn" class="glass-btn btn-outline">وەک میوان بڕۆ ژوورەوە</button>
    </div>

    <!-- شاشەی سەرەکی (دەرەوەی ژوور) -->
    <div id="homeView" class="hidden">
        <header style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 15px 30px; border-radius: 20px;">
            <div>
                <h2 style="font-size: 1.5rem;">سەکۆی سینەما</h2>
                <p style="font-size: 0.9rem; color: var(--text-muted);">سڵاو <span id="displayMyName" style="color:var(--primary);"></span></p>
                <p style="font-size: 0.8rem; color: #aaa;">ئایدی تۆ: <span id="displayMyShortId" style="user-select:all; cursor:pointer; color: #fff; font-weight: bold;"></span></p>
            </div>
            <button id="logoutBtn" class="glass-btn btn-danger" style="width: auto; padding: 8px 15px; font-size: 1rem;">دەرچوون</button>
        </header>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
            <!-- بەشی ژوور -->
            <div class="glass-panel">
                <h3 style="margin-bottom: 20px; font-size: 1.4rem;">🎬 ژووری سەیرکردن</h3>
                <div class="input-group">
                    <input type="text" id="newVideoInput" class="glass-input" placeholder="لینک لێرە دابنێ...">
                </div>
                <button id="createRoomBtn" class="glass-btn btn-white" style="margin-bottom: 20px;">دروستکردنی ژوور</button>
                <div class="input-group" style="text-align: center; color: rgba(255,255,255,0.5);">یان</div>
                <div class="input-group">
                    <input type="text" id="joinRoomInput" class="glass-input" placeholder="کۆدی ژووری هاوڕێکەت...">
                </div>
                <button id="joinRoomBtn" class="glass-btn btn-outline">چوونە ناو ژوور</button>
            </div>

            <!-- بەشی هاوڕێیان و چات و داواکاری -->
            <div class="glass-panel">
                <h3 style="margin-bottom: 20px; font-size: 1.4rem;">💬 هاوڕێکانم و چات</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input type="text" id="friendShortIdInput" class="glass-input" placeholder="ئایدی کورتی هاوڕێکەت...">
                    <button id="addFriendBtn" class="glass-btn btn-white" style="width: auto; padding: 0 20px;">زیادکردن</button>
                </div>

                <h4 style="margin-bottom: 10px; color: var(--text-muted); font-size: 1.1rem;">داواکارییە هاوڕێیەتییەکان</h4>
                <div id="friendRequestsContainer" style="margin-bottom: 20px; max-height: 200px; overflow-y: auto;">
                    <p style="color:#aaa;">هیچ داواکارییەکت نییە.</p>
                </div>

                <h4 style="margin-bottom: 10px; color: var(--text-muted); font-size: 1.1rem;">لیستی هاوڕێیان</h4>
                <div id="friendsList" style="max-height: 250px; overflow-y: auto;">
                    <!-- هاوڕێکان لێرە دەردەکەون -->
                </div>
            </div>
        </div>
    </div>

    <!-- پەنجەرەی چاتی تایبەت (DM) -->
    <div id="privateChatView" class="hidden">
        <div class="dm-header">
            <h2 id="dmFriendName">ناوی هاوڕێ</h2>
            <button id="closeDmBtn" class="glass-btn btn-danger" style="width: auto; padding: 5px 15px;">داخستن</button>
        </div>
        <div class="dm-messages" id="dmMessagesBox"></div>
        <div class="chat-input-box">
            <input type="text" id="dmInput" class="glass-input" placeholder="نامەیەک بنووسە...">
            <button id="sendDmBtn" class="send-btn">ناردن</button>
        </div>
    </div>

    <!-- شاشەی ناو ژووری سەیرکردنی فیلم (وەک خۆی) -->
    <div id="roomView" class="hidden">
        <div class="glass-panel" style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; padding: 15px 30px;">
            <div>
                <span style="color: var(--text-muted); font-size: 1.1rem;">کۆدی ژوور:</span>
                <strong id="roomCodeDisplay" style="font-size: 1.5rem; letter-spacing: 2px; color: var(--primary);">---</strong>
            </div>
            <button id="leaveRoomBtn" class="glass-btn btn-danger" style="width: auto; padding: 10px 20px; font-size: 1.1rem;">جێهێشتن</button>
        </div>

        <div class="room-grid">
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div class="video-wrapper" id="playerWrapper">
                    <div style="display:flex; height:100%; align-items:center; justify-content:center; color:#aaa; font-size: 1.2rem;">چاوەڕێی ڤیدیۆ...</div>
                </div>

                <div id="adminControls" class="glass-panel hidden" style="padding: 20px;">
                    <h3 style="margin-bottom: 15px; color: var(--primary); font-size: 1.3rem;">⚙️ ڕێکخستنی ئەدمین</h3>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 1.1rem;">
                        <span>قوفڵکردنی چات</span>
                        <div id="chatLockSwitch" class="ios-switch"></div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="updateVideoInput" class="glass-input" placeholder="لینکی نوێ دابنێ...">
                        <button id="updateVideoBtn" class="glass-btn btn-white" style="width: auto; padding: 0 20px;">گۆڕین</button>
                    </div>
                </div>
            </div>

            <div class="glass-panel" style="display: flex; flex-direction: column; padding: 20px;">
                <h3 style="margin-bottom: 15px; border-bottom: 1px solid var(--border-glass); padding-bottom: 10px;">چاتی ژوور</h3>
                <div id="chatSection" style="flex:1; display:flex; flex-direction:column;">
                    <div class="chat-container" id="chatBox"></div>
                    <div id="chatLockedMsg" style="text-align:center; color:var(--danger); padding:10px; display:none; font-size:1.1rem;">🔒 چات داخراوە</div>
                    <div class="chat-input-box" id="chatInputArea">
                        <input type="text" id="chatInput" class="glass-input" placeholder="نامە بنووسە...">
                        <button id="sendChatBtn" class="send-btn">ناردن</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // هێنانی مۆدیوڵەکانی فایەربەیس
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, set, onValue, push, update, get, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAc0iAMRewvMEfpxBRAVsMs7s8ppskeUp8",
        authDomain: "whith-him.firebaseapp.com",
        databaseURL: "https://whith-him-default-rtdb.firebaseio.com/",
        projectId: "whith-him",
        storageBucket: "whith-him.firebasestorage.app",
        messagingSenderId: "677366602778",
        appId: "1:677366602778:web:db312776554c5bba9945a3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const googleProvider = new GoogleAuthProvider();

    let myId = null;
    let myName = null;
    let myShortId = null;
    let currentRoomId = null;
    let activeDmChatId = null;

    const loginView = document.getElementById('loginView');
    const homeView = document.getElementById('homeView');
    const roomView = document.getElementById('roomView');
    const privateChatView = document.getElementById('privateChatView');

    // دروستکردنی ئایدی کورت (6 پیتی گەورە)
    function generateShortId() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let result = '';
        for (let i = 0; i < 6; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    // گەڕانەوەی UID لە ئایدی کورتەوە
    async function getUidByShortId(shortId) {
        const snap = await get(ref(db, `shortIds/${shortId}`));
        return snap.exists() ? snap.val() : null;
    }

    // ==========================================
    // 1. بەشی چوونە ژوورەوە و ئایدی کورت
    // ==========================================

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            myId = user.uid;
            myName = user.displayName || localStorage.getItem('guestName') || "میوان_" + Math.floor(Math.random()*1000);

            // دڵنیابوون لەوەی ئایدی کورت هەیە
            const userSnap = await get(ref(db, `users/${myId}`));
            const userData = userSnap.val() || {};
            
            if (!userData.shortId) {
                // دروستکردنی ئایدی کورتی ناوازە
                let shortId = generateShortId();
                let exists = true;
                while (exists) {
                    const check = await get(ref(db, `shortIds/${shortId}`));
                    if (!check.exists()) exists = false;
                    else shortId = generateShortId();
                }
                myShortId = shortId;
                // پاشەکەوتکردن لە دوو شوێن
                await set(ref(db, `users/${myId}`), { 
                    name: myName, 
                    email: user.email || 'نهێنی',
                    shortId: myShortId
                });
                await set(ref(db, `shortIds/${myShortId}`), myId);
            } else {
                myShortId = userData.shortId;
            }

            document.getElementById('displayMyName').textContent = myName;
            document.getElementById('displayMyShortId').textContent = myShortId;

            loginView.classList.add('hidden');
            homeView.classList.remove('hidden');
            loadFriends();
            loadFriendRequests(); // گوێگرتن لە داواکارییە نوێیەکان
        } else {
            myShortId = null;
            loginView.classList.remove('hidden');
            homeView.classList.add('hidden');
            roomView.classList.add('hidden');
            privateChatView.classList.add('hidden');
        }
    });

    document.getElementById('loginEmailBtn').addEventListener('click', () => {
        const e = document.getElementById('emailInput').value;
        const p = document.getElementById('passwordInput').value;
        if(e && p) signInWithEmailAndPassword(auth, e, p).catch(err => alert("هەڵە هەیە لە ئیمەیڵ یان پاسۆرد"));
    });

    document.getElementById('signupEmailBtn').addEventListener('click', () => {
        const e = document.getElementById('emailInput').value;
        const p = document.getElementById('passwordInput').value;
        if(e && p) createUserWithEmailAndPassword(auth, e, p).then(() => {
            const name = prompt("ناوی خۆت بنووسە:");
            localStorage.setItem('guestName', name || "بەکارهێنەر");
        }).catch(err => alert(err.message));
    });

    document.getElementById('loginGoogleBtn').addEventListener('click', () => {
        signInWithPopup(auth, googleProvider).catch(err => alert(err.message));
    });

    document.getElementById('loginAnonBtn').addEventListener('click', () => {
        const name = prompt("ناوی خۆت بنووسە بۆ ناو چات:");
        if(name) {
            localStorage.setItem('guestName', name);
            signInAnonymously(auth).catch(err => alert(err.message));
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

    // ==========================================
    // 2. سیستەمی داواکاری هاوڕێیەتی
    // ==========================================

    // ناردنی داواکاری هاوڕێیەتی
    document.getElementById('addFriendBtn').addEventListener('click', async () => {
        const targetShortId = document.getElementById('friendShortIdInput').value.trim().toUpperCase();
        if (!targetShortId) return alert('ئایدی کورت بنووسە!');
        if (targetShortId === myShortId) return alert('ناتوانیت خۆت زیاد بکەیت!');

        const targetUid = await getUidByShortId(targetShortId);
        if (!targetUid) return alert('هیچ کەسێک بەم ئایدییە نەدۆزرایەوە!');

        // ڕێگری لە دووبارە ناردن
        const alreadyPending = await get(ref(db, `users/${myId}/sentRequests/${targetUid}`));
        if (alreadyPending.exists()) return alert('پێشتر داواکاری بۆ ئەم کەسە ناردووە!');
        
        // دروستکردنی داواکاری
        const requestId = push(ref(db, 'friend_requests')).key;
        const requestData = {
            fromUid: myId,
            fromName: myName,
            fromShortId: myShortId,
            toUid: targetUid,
            status: 'pending',
            timestamp: Date.now()
        };

        await set(ref(db, `friend_requests/${requestId}`), requestData);
        await set(ref(db, `users/${targetUid}/pendingRequests/${requestId}`), true);
        await set(ref(db, `users/${myId}/sentRequests/${targetUid}`), true); // نیشانەی نێردراو

        document.getElementById('friendShortIdInput').value = '';
        alert('داواکاری نێردرا!');
    });

    function loadFriendRequests() {
        // گوێگرتن لە لیستی داواکارییە هاتووەکان
        onValue(ref(db, `users/${myId}/pendingRequests`), async (snap) => {
            const container = document.getElementById('friendRequestsContainer');
            container.innerHTML = '';

            if (!snap.exists()) {
                container.innerHTML = '<p style="color:#aaa;">هیچ داواکارییەکت نییە.</p>';
                return;
            }

            const requestIds = Object.keys(snap.val());
            for (const reqId of requestIds) {
                const reqSnap = await get(ref(db, `friend_requests/${reqId}`));
                if (!reqSnap.exists()) continue;
                const req = reqSnap.val();
                if (req.status !== 'pending') continue;

                const div = document.createElement('div');
                div.className = 'request-item';
                div.innerHTML = `
                    <span>👤 ${req.fromName} (${req.fromShortId})</span>
                    <div>
                        <button class="btn-reject" data-reqid="${reqId}">ڕەتکردنەوە</button>
                        <button class="btn-accept" data-reqid="${reqId}">قبوڵکردن</button>
                    </div>
                `;
                container.appendChild(div);
            }

            // ئیڤێنتی قبوڵ و ڕەتکردنەوە
            container.querySelectorAll('.btn-accept').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const reqId = e.target.dataset.reqid;
                    await acceptFriendRequest(reqId);
                });
            });

            container.querySelectorAll('.btn-reject').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const reqId = e.target.dataset.reqid;
                    await rejectFriendRequest(reqId);
                });
            });
        });
    }

    async function acceptFriendRequest(reqId) {
        const reqSnap = await get(ref(db, `friend_requests/${reqId}`));
        if (!reqSnap.exists()) return;
        const req = reqSnap.val();
        if (req.toUid !== myId) return;

        // زیادکردنی هاوڕێ بۆ هەردوولا
        await update(ref(db, `users/${myId}/friends`), { [req.fromUid]: req.fromName });
        await update(ref(db, `users/${req.fromUid}/friends`), { [myId]: myName });

        // سڕینەوەی داواکاری
        await remove(ref(db, `friend_requests/${reqId}`));
        await remove(ref(db, `users/${myId}/pendingRequests/${reqId}`));
        await remove(ref(db, `users/${req.fromUid}/sentRequests/${myId}`));

        alert(`${req.fromName} بوو بە هاوڕێ!`);
    }

    async function rejectFriendRequest(reqId) {
        const reqSnap = await get(ref(db, `friend_requests/${reqId}`));
        if (!reqSnap.exists()) return;
        const req = reqSnap.val();
        if (req.toUid !== myId) return;

        // سڕینەوەی داواکاری
        await remove(ref(db, `friend_requests/${reqId}`));
        await remove(ref(db, `users/${myId}/pendingRequests/${reqId}`));
        await remove(ref(db, `users/${req.fromUid}/sentRequests/${myId}`));

        alert('داواکاری ڕەتکرایەوە.');
    }

    // بارکردنی لیستی هاوڕێیان (وەک پێشوو)
    function loadFriends() {
        onValue(ref(db, `users/${myId}/friends`), (snap) => {
            const list = document.getElementById('friendsList');
            list.innerHTML = '';
            if (!snap.exists()) {
                list.innerHTML = '<p style="color:#aaa;">هیچ هاوڕێیەکت نییە.</p>';
                return;
            }
            
            snap.forEach(child => {
                const fId = child.key;
                const fName = child.val();
                
                const div = document.createElement('div');
                div.className = 'friend-item';
                div.innerHTML = `<span>👤 ${fName}</span> <button class="dm-btn">نامە ناردن</button>`;
                
                div.addEventListener('click', () => openPrivateChat(fId, fName));
                list.appendChild(div);
            });
        });
    }

    // چاتی تایبەت (DM) - بێ گۆڕانکاری
    function openPrivateChat(friendId, friendName) {
        activeDmChatId = [myId, friendId].sort().join('_');
        document.getElementById('dmFriendName').textContent = friendName;
        privateChatView.classList.remove('hidden');
        homeView.classList.add('hidden');

        onValue(ref(db, `direct_messages/${activeDmChatId}`), (snap) => {
            const box = document.getElementById('dmMessagesBox');
            box.innerHTML = '';
            snap.forEach(child => {
                const msg = child.val();
                const isMe = msg.senderId === myId;
                const div = document.createElement('div');
                div.className = `message ${isMe ? 'mine' : ''}`;
                div.innerHTML = `<span class="msg-name">${msg.name}</span><div class="msg-text">${msg.text}</div>`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    document.getElementById('sendDmBtn').addEventListener('click', () => {
        const text = document.getElementById('dmInput').value.trim();
        if (text && activeDmChatId) {
            push(ref(db, `direct_messages/${activeDmChatId}`), {
                senderId: myId, name: myName, text: text, timestamp: Date.now()
            });
            document.getElementById('dmInput').value = '';
        }
    });
    document.getElementById('dmInput').addEventListener('keypress', e => { if(e.key === 'Enter') document.getElementById('sendDmBtn').click(); });
    document.getElementById('closeDmBtn').addEventListener('click', () => {
        activeDmChatId = null;
        privateChatView.classList.add('hidden');
        homeView.classList.remove('hidden');
    });

    // ==========================================
    // 3. بەشی ژووری ڤیدیۆ (وەک خۆی)
    // ==========================================
    
    let roomDataGlobal = null;
    let isOwner = false;
    let isAdmin = false;
    let videoPlayer = null;
    let isSeeking = false;

    document.getElementById('createRoomBtn').addEventListener('click', async () => {
        const url = document.getElementById('newVideoInput').value.trim();
        if(!url) return alert("تکایە لینکێک بنووسە!");
        const roomId = Math.random().toString(36).substr(2, 5).toUpperCase();
        await set(ref(db, `rooms_ku/${roomId}`), {
            ownerId: myId, videoUrl: url, chatLocked: false, admins: { [myId]: true },
            state: { time: 0, status: 'paused', updatedBy: myId, timestamp: Date.now() }
        });
        enterRoom(roomId);
    });

    document.getElementById('joinRoomBtn').addEventListener('click', async () => {
        const code = document.getElementById('joinRoomInput').value.trim().toUpperCase();
        if(!code) return alert("کۆد بنووسە!");
        const snap = await get(ref(db, `rooms_ku/${code}`));
        if (snap.exists()) { enterRoom(code); } else { alert("ژوورەکە بوونی نییە!"); }
    });

    function enterRoom(roomId) {
        currentRoomId = roomId;
        homeView.classList.add('hidden');
        roomView.classList.remove('hidden');
        document.getElementById('roomCodeDisplay').textContent = roomId;
        
        onValue(ref(db, `rooms_ku/${roomId}`), (snap) => {
            if (!snap.exists()) { alert("ژوور داخراوە"); leaveRoom(); return; }
            const data = snap.val();
            roomDataGlobal = data;
            isOwner = (data.ownerId === myId);
            isAdmin = (data.admins && data.admins[myId]) || isOwner;

            document.getElementById('adminControls').classList.toggle('hidden', !isAdmin);
            if(isAdmin) document.getElementById('updateVideoInput').value = data.videoUrl;

            const chatLockSwitch = document.getElementById('chatLockSwitch');
            if (data.chatLocked) {
                chatLockSwitch.classList.add('active');
                if (!isAdmin) { document.getElementById('chatInputArea').style.display = 'none'; document.getElementById('chatLockedMsg').style.display = 'block'; }
            } else {
                chatLockSwitch.classList.remove('active');
                document.getElementById('chatInputArea').style.display = 'flex'; document.getElementById('chatLockedMsg').style.display = 'none';
            }

            if (!videoPlayer || videoPlayer.dataset.url !== data.videoUrl) {
                loadSmartVideo(data.videoUrl);
            }

            if (!isAdmin && videoPlayer && videoPlayer.tagName === 'VIDEO' && data.state) {
                if (Math.abs(videoPlayer.currentTime - data.state.time) > 2) videoPlayer.currentTime = data.state.time;
                if (data.state.status === 'playing' && videoPlayer.paused) videoPlayer.play().catch(()=>{});
                else if (data.state.status === 'paused' && !videoPlayer.paused) videoPlayer.pause();
            }
        });

        onValue(ref(db, `rooms_ku/${roomId}/messages`), (snap) => {
            const box = document.getElementById('chatBox');
            box.innerHTML = '';
            snap.forEach(child => {
                const msg = child.val();
                const isMe = msg.senderId === myId;
                const isMsgOwner = msg.senderId === roomDataGlobal.ownerId;
                const isMsgAdmin = roomDataGlobal.admins && roomDataGlobal.admins[msg.senderId];
                let badge = isMsgOwner ? '👑' : (isMsgAdmin ? '🛡️' : '');
                
                const div = document.createElement('div');
                div.className = `message ${isMe ? 'mine' : ''}`;
                div.innerHTML = `<span class="msg-name ${isMsgOwner?'owner':''}">${badge} ${msg.name}</span><div class="msg-text">${msg.text}</div>`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function loadSmartVideo(url) {
        const wrapper = document.getElementById('playerWrapper');
        wrapper.innerHTML = '';
        videoPlayer = null;

        const cleanUrl = url.trim();
        const isYoutube = cleanUrl.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))((\w|-){11})/);
        const isSafeWebpage = cleanUrl.includes('kurdsub') || cleanUrl.includes('youtube') || cleanUrl.includes('vimeo');

        if (isYoutube) {
            wrapper.innerHTML = `<iframe src="https://www.youtube.com/embed/${isYoutube[1]}?autoplay=1" allow="autoplay; fullscreen" style="width:100%; height:100%; border:none;" data-url="${cleanUrl}"></iframe>`;
            videoPlayer = wrapper.firstChild; return;
        }

        if (isSafeWebpage && !isYoutube) {
            wrapper.innerHTML = `<iframe src="${cleanUrl}" allow="autoplay; fullscreen" style="width:100%; height:100%; border:none;" data-url="${cleanUrl}"></iframe>`;
            videoPlayer = wrapper.firstChild; return;
        }

        videoPlayer = document.createElement('video');
        videoPlayer.src = cleanUrl;
        videoPlayer.dataset.url = cleanUrl;
        videoPlayer.controls = true;
        videoPlayer.preload = "auto";
        videoPlayer.setAttribute('playsinline', '');
        videoPlayer.setAttribute('controlsList', 'nodownload');
        videoPlayer.oncontextmenu = () => false;
        
        videoPlayer.onerror = function() {
            wrapper.innerHTML = `<div style="text-align:center; padding:20px; color:#ff8a8a;">ئەم لینکە کارناکات یان تەنها بۆ داگرتنە!<br><small>تکایە بۆتی @FileStreamBot بەکاربهێنە بۆ لینکی دروست.</small></div>`;
            videoPlayer = null;
        };

        wrapper.appendChild(videoPlayer);

        if (videoPlayer) {
            videoPlayer.addEventListener('play', () => { if (isAdmin && !isSeeking) updateState('playing'); });
            videoPlayer.addEventListener('pause', () => { if (isAdmin && !isSeeking) updateState('paused'); });
            videoPlayer.addEventListener('seeked', () => { if (isAdmin) updateState(videoPlayer.paused ? 'paused' : 'playing'); isSeeking = false; });
            videoPlayer.addEventListener('seeking', () => { isSeeking = true; });

            if (!isAdmin) {
                videoPlayer.addEventListener('play', (e) => { if (roomDataGlobal.state.status === 'paused') { e.preventDefault(); videoPlayer.pause(); } });
                videoPlayer.addEventListener('pause', (e) => { if (roomDataGlobal.state.status === 'playing') { e.preventDefault(); videoPlayer.play(); } });
            }
        }
    }

    function updateState(status) {
        if (!currentRoomId || !videoPlayer || videoPlayer.tagName !== 'VIDEO') return;
        update(ref(db, `rooms_ku/${currentRoomId}/state`), {
            time: videoPlayer.currentTime, status: status, updatedBy: myId, timestamp: Date.now()
        });
    }

    document.getElementById('chatLockSwitch').addEventListener('click', () => {
        if (!isAdmin) return;
        update(ref(db, `rooms_ku/${currentRoomId}`), { chatLocked: !roomDataGlobal.chatLocked });
    });

    document.getElementById('updateVideoBtn').addEventListener('click', () => {
        if (!isAdmin) return;
        const url = document.getElementById('updateVideoInput').value.trim();
        if (url) update(ref(db, `rooms_ku/${currentRoomId}`), { videoUrl: url });
    });

    document.getElementById('sendChatBtn').addEventListener('click', () => {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text || !currentRoomId) return;
        push(ref(db, `rooms_ku/${currentRoomId}/messages`), { senderId: myId, name: myName, text: text, timestamp: Date.now() });
        input.value = '';
    });

    document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('sendChatBtn').click(); });

    document.getElementById('leaveRoomBtn').addEventListener('click', leaveRoom);
    function leaveRoom() {
        currentRoomId = null; videoPlayer = null;
        roomView.classList.add('hidden');
        homeView.classList.remove('hidden');
    }
</script>
</body>
                    </html>
